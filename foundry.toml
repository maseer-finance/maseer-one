[profile.default]
src = "src"
out = "out"
libs = ["lib"]
build_info = true
sizes = true
optimizer = true
optimizer_runs = 21_000
solc_version = "0.8.34"
gas_limit = "18446744073709551615" # u64::MAX

# CI profile (FOUNDRY_PROFILE=ci). Inherits everything from default and
# throttles outgoing fork RPC requests so the provider does not return HTTP 429
# on the cold (uncached) run. Foundry's default is 330.
[profile.ci]
compute_units_per_second = 100

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"

[fuzz]
runs = 256
max_test_rejects = 65536
max_shrink_iters = 256

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
